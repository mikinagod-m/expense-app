{% extends "base.html" %}
{% block content %}
<a href="/">&larr; back</a>
<h1>Manager approvals</h1>
<p>Review submitted claims and approve or reject directly from this queue.</p>

<div id="msg" class="hint"></div>

<table id="pending-table">
  <thead>
    <tr>
      <th>Claim ID</th>
      <th>Reference</th>
      <th>Claimant</th>
      <th>Type</th>
      <th>Period</th>
      <th>Total</th>
      <th>Comment</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="pending-rows">
    <tr><td colspan="8">Loading pending claims...</td></tr>
  </tbody>
</table>

<script>
const messageBox = document.getElementById("msg");
const rowsNode = document.getElementById("pending-rows");

function setMessage(text, type = "") {
  messageBox.textContent = text;
  messageBox.className = `hint ${type}`.trim();
}

function bindCommentCounters() {
  const rows = rowsNode.querySelectorAll("tr[data-claim-id]");
  rows.forEach((row) => {
    const input = row.querySelector(".decision-comment");
    const counter = row.querySelector(".comment-counter");
    if (!input || !counter || input.dataset.counterBound === "1") return;
    const refresh = () => {
      counter.textContent = `${input.value.length}/120`;
    };
    input.addEventListener("input", refresh);
    input.dataset.counterBound = "1";
    refresh();
  });
}

function currency(v) {
  const n = Number(v || 0);
  return `£${n.toFixed(2)}`;
}

function rowHtml(c) {
  return `
    <tr data-claim-id="${c.id}">
      <td>${c.id}</td>
      <td>${c.ref || "—"}</td>
      <td>${c.claimant_name || `User ${c.user_id}`}</td>
      <td>${c.type || "—"}</td>
      <td>${c.period_label || c.period_id}</td>
      <td>${currency(c.gross_total)}</td>
      <td>
        <textarea class="decision-comment" maxlength="120" placeholder="Reason (required for rejection, optional for approval)"></textarea>
        <div class="comment-counter">0/120</div>
      </td>
      <td>
        <button onclick="decide(${c.id}, 'approved')">Approve</button>
        <button class="danger" onclick="decide(${c.id}, 'rejected')">Reject</button>
      </td>
    </tr>
  `;
}

async function loadPending() {
  setMessage("Loading pending approvals...");
  try {
    const r = await fetch("/manager/claims/pending");
    if (r.status === 401 || r.status === 403) {
      setMessage("Access denied. You need manager or finance permissions.", "err");
      rowsNode.innerHTML = "<tr><td colspan='8'>No access to this queue.</td></tr>";
      return;
    }
    const d = await r.json();
    if (!r.ok || d.ok === false) {
      setMessage("Unable to load pending claims.", "err");
      rowsNode.innerHTML = "<tr><td colspan='8'>Failed to load queue.</td></tr>";
      return;
    }
    if (!d.claims || d.claims.length === 0) {
      setMessage("No submitted claims are waiting for review.", "ok");
      rowsNode.innerHTML = "<tr><td colspan='8'>Queue is empty.</td></tr>";
      return;
    }
    rowsNode.innerHTML = d.claims.map(rowHtml).join("");
    bindCommentCounters();
    setMessage(`Loaded ${d.claims.length} pending claim(s).`, "ok");
  } catch (e) {
    setMessage("Network error while loading approvals.", "err");
    rowsNode.innerHTML = "<tr><td colspan='8'>Network error.</td></tr>";
  }
}

async function decide(claimId, decision) {
  const row = document.querySelector(`tr[data-claim-id="${claimId}"]`);
  const commentInput = row ? row.querySelector(".decision-comment") : null;
  const comment = commentInput ? commentInput.value.trim() : "";
  if (decision === "rejected" && !comment) {
    setMessage("Please enter a rejection comment before rejecting a claim.", "err");
    if (commentInput) commentInput.focus();
    return;
  }
  if (row) {
    row.querySelectorAll("button").forEach((b) => { b.disabled = true; });
  }
  const fd = new FormData();
  fd.append("decision", decision);
  fd.append("comment", comment);

  try {
    const r = await fetch(`/manager/claims/${claimId}/decision`, { method: "POST", body: fd });
    const d = await r.json();
    if (!r.ok || d.ok === false) {
      const detail = d.detail || "Unable to apply decision.";
      setMessage(detail, "err");
      if (row) {
        row.querySelectorAll("button").forEach((b) => { b.disabled = false; });
      }
      return;
    }
    setMessage(`Claim ${claimId} marked ${d.status}.`, "ok");
    await loadPending();
  } catch (e) {
    setMessage("Network error while applying decision.", "err");
    if (row) {
      row.querySelectorAll("button").forEach((b) => { b.disabled = false; });
    }
  }
}

loadPending();
</script>
{% endblock %}
