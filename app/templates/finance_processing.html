{% extends "base.html" %}
{% block content %}
<a href="/">&larr; back</a>
<h1>Finance processing queue</h1>
<p>Process approved claims and move them to the final processed state.</p>

<div id="msg" class="hint"></div>

<div class="filters">
  <label>Period
    <input id="f-period" type="text" placeholder="all or YYYY-MM" value="all">
  </label>
  <label>Type
    <select id="f-type">
      <option value="all">all</option>
      <option value="cash">cash</option>
      <option value="card">card</option>
    </select>
  </label>
  <button onclick="applyFilters()">Apply filters</button>
</div>

<div class="filters">
  <label>Status for export
    <select id="f-status-export">
      <option value="all">all</option>
      <option value="approved" selected>approved</option>
      <option value="submitted">submitted</option>
      <option value="rejected">rejected</option>
      <option value="processed">processed</option>
      <option value="draft">draft</option>
    </select>
  </label>
  <button onclick="downloadCsv()">Download CSV</button>
  <button onclick="downloadXlsx()">Download XLSX</button>
</div>

<table id="approved-table">
  <thead>
    <tr>
      <th>Claim ID</th>
      <th>Reference</th>
      <th>Claimant</th>
      <th>Type</th>
      <th>Period</th>
      <th>Total</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="approved-rows">
    <tr><td colspan="7">Loading approved claims...</td></tr>
  </tbody>
</table>

<script>
const financeMessageBox = document.getElementById("msg");
const financeRowsNode = document.getElementById("approved-rows");
const filterPeriodNode = document.getElementById("f-period");
const filterTypeNode = document.getElementById("f-type");
const filterStatusExportNode = document.getElementById("f-status-export");
let currentFilters = { period: "all", type: "all" };

function setFinanceMessage(text, type = "") {
  financeMessageBox.textContent = text;
  financeMessageBox.className = `hint ${type}`.trim();
}

function financeCurrency(v) {
  const n = Number(v || 0);
  return `£${n.toFixed(2)}`;
}

function financeRowHtml(c) {
  return `
    <tr data-claim-id="${c.id}">
      <td>${c.id}</td>
      <td>${c.ref || "—"}</td>
      <td>${c.claimant_name || `User ${c.user_id}`}</td>
      <td>${c.type || "—"}</td>
      <td>${c.period_label || c.period_id}</td>
      <td>${financeCurrency(c.gross_total)}</td>
      <td>
        <button onclick="processClaim(${c.id})">Mark processed</button>
      </td>
    </tr>
  `;
}

function filterQuery(extra = {}) {
  const params = new URLSearchParams({
    period: currentFilters.period || "all",
    type: currentFilters.type || "all",
    ...extra,
  });
  return params.toString();
}

async function loadApproved() {
  setFinanceMessage("Loading approved queue...");
  try {
    const r = await fetch(`/finance/claims/approved?${filterQuery()}`);
    if (r.status === 401 || r.status === 403) {
      setFinanceMessage("Access denied. You need finance permissions.", "err");
      financeRowsNode.innerHTML = "<tr><td colspan='7'>No access to finance queue.</td></tr>";
      return;
    }
    const d = await r.json();
    if (!r.ok || d.ok === false) {
      setFinanceMessage("Unable to load approved claims.", "err");
      financeRowsNode.innerHTML = "<tr><td colspan='7'>Failed to load queue.</td></tr>";
      return;
    }
    if (!d.claims || d.claims.length === 0) {
      setFinanceMessage("No approved claims waiting for processing.", "ok");
      financeRowsNode.innerHTML = "<tr><td colspan='7'>Queue is empty.</td></tr>";
      return;
    }
    financeRowsNode.innerHTML = d.claims.map(financeRowHtml).join("");
    setFinanceMessage(`Loaded ${d.claims.length} approved claim(s).`, "ok");
  } catch (e) {
    setFinanceMessage("Network error while loading finance queue.", "err");
    financeRowsNode.innerHTML = "<tr><td colspan='7'>Network error.</td></tr>";
  }
}

async function processClaim(claimId) {
  try {
    const r = await fetch(`/finance/claims/${claimId}/process`, { method: "POST" });
    const d = await r.json();
    if (!r.ok || d.ok === false) {
      const detail = d.detail || "Unable to process claim.";
      setFinanceMessage(detail, "err");
      return;
    }
    setFinanceMessage(`Claim ${claimId} marked processed.`, "ok");
    await loadApproved();
  } catch (e) {
    setFinanceMessage("Network error while processing claim.", "err");
  }
}

function applyFilters() {
  currentFilters.period = (filterPeriodNode.value || "all").trim() || "all";
  currentFilters.type = filterTypeNode.value || "all";
  loadApproved();
}

function downloadCsv() {
  const status = filterStatusExportNode.value || "all";
  window.location.href = `/finance/exports/lines.csv?${filterQuery({ status })}`;
}

function downloadXlsx() {
  const status = filterStatusExportNode.value || "all";
  window.location.href = `/finance/exports/lines.xlsx?${filterQuery({ status })}`;
}

loadApproved();
</script>
{% endblock %}
